name: Build

on:
  push:
    branches: ["main"]
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-latest
    env:
      DERIVED_DATA_PATH: build/DerivedData
      SOURCE_PACKAGES_DIR: build/SourcePackages
      OUTPUT_DIR: build
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: "26.3"

      - name: Print Toolchain Versions
        run: |
          xcodebuild -version
          xcrun swift --version

      - name: Restore Dependency Caches
        uses: actions/cache@v5
        with:
          path: |
            build/SourcePackages
            ~/.tuist/Cache
            ~/Library/Caches/org.swift.swiftpm
          key: ${{ runner.os }}-xcode26_3-deps-${{ hashFiles('Package.swift', '.package.resolved', '**/Package.resolved', 'Tuist.swift', 'Workspace.swift', '**/Project.swift') }}
          restore-keys: |
            ${{ runner.os }}-xcode26_3-deps-

      - name: Setup Tuist
        run: |
          brew install tuist
          tuist install
          tuist generate

      - name: Build Release (App)
        run: |
          set -euo pipefail
          mkdir -p build/logs
          LOG_FILE="build/logs/App.log"
          if ! xcodebuild \
            build \
            -workspace FireBox.xcworkspace \
            -scheme App \
            -configuration Release \
            -derivedDataPath "${DERIVED_DATA_PATH}" \
            -clonedSourcePackagesDirPath "${SOURCE_PACKAGES_DIR}" \
            -destination "generic/platform=macOS" \
            COMPILER_INDEX_STORE_ENABLE=NO \
            ONLY_ACTIVE_ARCH=NO \
            SWIFT_OPTIMIZATION_LEVEL=-O \
            SWIFT_COMPILATION_MODE=wholemodule \
            LLVM_LTO=YES \
            DEAD_CODE_STRIPPING=YES \
            STRIP_INSTALLED_PRODUCT=YES \
            COPY_PHASE_STRIP=YES \
            ENABLE_TESTABILITY=NO \
            "OTHER_SWIFT_FLAGS=\$(inherited) -cross-module-optimization" \
            2>&1 | tee "${LOG_FILE}"; then
            echo "Build failed for scheme: App"
            grep -nE "error:|\\*\\* BUILD FAILED \\*\\*|CompileSwift|SwiftCompile|Command SwiftCompile failed" "${LOG_FILE}" || true
            exit 1
          fi

      - name: Build Release (Demo)
        run: |
          set -euo pipefail
          mkdir -p build/logs
          LOG_FILE="build/logs/Demo.log"
          if ! xcodebuild \
            build \
            -workspace FireBox.xcworkspace \
            -scheme Demo \
            -configuration Release \
            -derivedDataPath "${DERIVED_DATA_PATH}" \
            -clonedSourcePackagesDirPath "${SOURCE_PACKAGES_DIR}" \
            -destination "generic/platform=macOS" \
            COMPILER_INDEX_STORE_ENABLE=NO \
            ONLY_ACTIVE_ARCH=NO \
            SWIFT_OPTIMIZATION_LEVEL=-O \
            SWIFT_COMPILATION_MODE=wholemodule \
            LLVM_LTO=YES \
            DEAD_CODE_STRIPPING=YES \
            STRIP_INSTALLED_PRODUCT=YES \
            COPY_PHASE_STRIP=YES \
            ENABLE_TESTABILITY=NO \
            "OTHER_SWIFT_FLAGS=\$(inherited) -cross-module-optimization" \
            2>&1 | tee "${LOG_FILE}"; then
            echo "Build failed for scheme: Demo"
            grep -nE "error:|\\*\\* BUILD FAILED \\*\\*|CompileSwift|SwiftCompile|Command SwiftCompile failed" "${LOG_FILE}" || true
            exit 1
          fi

      - name: Build Release (Service)
        run: |
          set -euo pipefail
          mkdir -p build/logs
          LOG_FILE="build/logs/Service.log"
          if ! xcodebuild \
            build \
            -workspace FireBox.xcworkspace \
            -scheme Service \
            -configuration Release \
            -derivedDataPath "${DERIVED_DATA_PATH}" \
            -clonedSourcePackagesDirPath "${SOURCE_PACKAGES_DIR}" \
            -destination "generic/platform=macOS" \
            COMPILER_INDEX_STORE_ENABLE=NO \
            ONLY_ACTIVE_ARCH=NO \
            SWIFT_OPTIMIZATION_LEVEL=-O \
            SWIFT_COMPILATION_MODE=wholemodule \
            LLVM_LTO=YES \
            DEAD_CODE_STRIPPING=YES \
            STRIP_INSTALLED_PRODUCT=YES \
            COPY_PHASE_STRIP=YES \
            ENABLE_TESTABILITY=NO \
            "OTHER_SWIFT_FLAGS=\$(inherited) -cross-module-optimization" \
            2>&1 | tee "${LOG_FILE}"; then
            echo "Build failed for scheme: Service"
            grep -nE "error:|\\*\\* BUILD FAILED \\*\\*|CompileSwift|SwiftCompile|Command SwiftCompile failed" "${LOG_FILE}" || true
            exit 1
          fi

      - name: Package FireBox.pkg
        run: |
          set -euo pipefail
          VERSION_RAW="${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || '0.1.0' }}"
          VERSION="${VERSION_RAW#v}"

          PAYLOAD_DIR="${OUTPUT_DIR}/pkg/Payload"
          SCRIPTS_DIR="${OUTPUT_DIR}/pkg/scripts"
          COMPONENTS_PLIST="${OUTPUT_DIR}/pkg/components.plist"
          mkdir -p "${PAYLOAD_DIR}/Applications"
          mkdir -p "${PAYLOAD_DIR}/Library/LaunchAgents"
          mkdir -p "${PAYLOAD_DIR}/Library/Application Support/FireBox/Service/Frameworks"
          mkdir -p "${SCRIPTS_DIR}"

          cp -R "${DERIVED_DATA_PATH}/Build/Products/Release/FireBox.app" "${PAYLOAD_DIR}/Applications/FireBox.app"

          cp "${DERIVED_DATA_PATH}/Build/Products/Release/Service" "${PAYLOAD_DIR}/Library/Application Support/FireBox/Service/Service"
          cp -R "${DERIVED_DATA_PATH}/Build/Products/Release/Shared.framework" "${PAYLOAD_DIR}/Library/Application Support/FireBox/Service/Frameworks/"
          chmod 755 "${PAYLOAD_DIR}/Library/Application Support/FireBox/Service/Service"

          cp "App/Resources/LaunchAgents/com.firebox.service.plist" "${PAYLOAD_DIR}/Library/LaunchAgents/"
          cp "App/Package/postinstall" "${SCRIPTS_DIR}/postinstall"
          chmod 755 "${SCRIPTS_DIR}/postinstall"
          pkgbuild --analyze --root "${PAYLOAD_DIR}" "${COMPONENTS_PLIST}"
          /usr/libexec/PlistBuddy -c "Set :1:BundleIsRelocatable false" "${COMPONENTS_PLIST}"

          pkgbuild --root "${PAYLOAD_DIR}" \
                   --component-plist "${COMPONENTS_PLIST}" \
                   --identifier com.firebox.app \
                   --version "${VERSION}" \
                   --scripts "${SCRIPTS_DIR}" \
                   --install-location / \
                   "${OUTPUT_DIR}/FireBox.pkg"

      - name: Package FireChatBox.dmg
        run: |
          set -euo pipefail
          VERSION_RAW="${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || '0.1.0' }}"
          VERSION="${VERSION_RAW#v}"

          DMG_NAME="FireChatBox.dmg"
          DMG_PATH="${OUTPUT_DIR}/${DMG_NAME}"
          TEMP_DIR="${OUTPUT_DIR}/dmg_temp"

          mkdir -p "${TEMP_DIR}"
          cp -R "${DERIVED_DATA_PATH}/Build/Products/Release/FireChatBox.app" "${TEMP_DIR}/FireChatBox.app"
          ln -s /Applications "${TEMP_DIR}/Applications"

          hdiutil create -volname "FireChatBox" \
                         -srcfolder "${TEMP_DIR}" \
                         -ov -format UDZO \
                         "${DMG_PATH}"

          rm -rf "${TEMP_DIR}"

      - name: Package SDK.zip
        run: |
          set -euo pipefail
          SDK_DIR="${OUTPUT_DIR}/sdk/FireBoxClient"
          mkdir -p "${SDK_DIR}/Sources"

          cp -R "${DERIVED_DATA_PATH}/Build/Products/Release/Client.framework" "${SDK_DIR}/"
          cp -R "${DERIVED_DATA_PATH}/Build/Products/Release/Shared.framework" "${SDK_DIR}/"

          cp "Client/Package.swift" "${SDK_DIR}/"
          cp -R "Client/Sources/"* "${SDK_DIR}/Sources/"

          cd "${OUTPUT_DIR}/sdk"
          zip -r "../SDK.zip" FireBoxClient

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            build/FireBox.pkg
            build/FireChatBox.dmg
            build/SDK.zip
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
